name: Build Sub2API for FreeBSD

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Upstream tag (e.g. v0.1.139). Leave blank for latest release.'
        required: false
        default: ''
  schedule:
    - cron: '0 2 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GOOS: freebsd
      GOARCH: amd64
      CGO_ENABLED: 0
    steps:
      - name: Checkout Sub2API
        uses: actions/checkout@v4
        with:
          repository: Wei-Shaw/sub2api
          ref: ${{ inputs.tag != '' && format('refs/tags/{0}', inputs.tag) || 'main' }}
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "VERSION=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(curl -sL https://api.github.com/repos/Wei-Shaw/sub2api/releases/latest | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
            if [ -z "$VERSION" ]; then
              VERSION=$(git describe --tags --always)
            fi
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Build frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Generate wire
        run: |
          cd backend
          go install github.com/google/wire/cmd/wire@latest
          export PATH="$(go env GOPATH)/bin:$PATH"
          wire gen ./...

      - name: Build FreeBSD binary
        run: |
          cd backend
          VERSION="${{ steps.version.outputs.VERSION }}"
          go build -tags embed -ldflags="-s -w -trimpath -X main.Version=${VERSION}" -o sub2api_freebsd_amd64 ./cmd/server

      - name: Package artifact
        run: |
          mkdir -p sub2api_freebsd_amd64
          cp backend/sub2api_freebsd_amd64 sub2api_freebsd_amd64/
          tar czf sub2api_${{ steps.version.outputs.VERSION }}_freebsd_amd64.tar.gz sub2api_freebsd_amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub2api-freebsd-amd64
          path: sub2api_${{ steps.version.outputs.VERSION }}_freebsd_amd64.tar.gz
          retention-days: 30

      - name: Create GitHub Release (if tag specified)
        if: inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          files: sub2api_${{ steps.version.outputs.VERSION }}_freebsd_amd64.tar.gz
          body: FreeBSD amd64 build of Sub2API ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
