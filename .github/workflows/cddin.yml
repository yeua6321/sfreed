name: Build for Serv00 FreeBSD

on:
  workflow_dispatch: # 支持手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # 兼容该项目较新的 Go 环境要求

      - name: Build FreeBSD Binary
        run: |
          # 1. 强制切换到后端源码所在子目录
          cd backend || { echo "错误: 没找到 backend 目录"; exit 1; }
          
          # 2. 生成 Ent 框架所需的依赖文件 (如果项目有需要)
          go generate ./ent || echo "跳过 go generate"

          # 3. 编译 FreeBSD 二进制文件
          # 必须携带 -tags embed 否则打包出来的程序不带前端网页！
          CGO_ENABLED=0 GOOS=freebsd GOARCH=amd64 go build -tags embed -ldflags="-s -w" -o sub2api ./cmd/server/

          # 4. 将编译好的二进制移动到工作流根目录
          mv sub2api $GITHUB_WORKSPACE/

      - name: Tar binary file
        run: |
          tar -czvf sub2api-freebsd-amd64.tar.gz sub2api

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub2api-freebsd-pkg
          path: sub2api-freebsd-amd64.tar.gz
          retention-days: 5
