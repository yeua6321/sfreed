name: Build for Serv00 FreeBSD

on:
  workflow_dispatch: # 支持手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # 匹配项目所需较新版 Go 环境

      - name: Build FreeBSD Binary
        run: |
          # 开启 CGO_ENABLED=0 确保纯静态编译，完美兼容 Serv00
          CGO_ENABLED=0 GOOS=freebsd GOARCH=amd64 go build -ldflags="-s -w" -o sub2api main.go

      - name: Tar binary file
        run: |
          tar -czvf sub2api-freebsd-amd64.tar.gz sub2api

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub2api-freebsd-pkg
          path: sub2api-freebsd-amd64.tar.gz
          retention-days: 5 # 编译好的文件在 GitHub 留存 5 天
