name: Build for Serv00 FreeBSD

on:
  workflow_dispatch: # 支持手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # 使用匹配项目的较新版 Go 环境

      - name: Clone official Sub2API and Build FreeBSD Binary
        run: |
          echo "==== 1. 正在克隆官方最新版 Sub2API 源码 ===="
          # 直接拉取官方的最新代码，避免你本地仓库代码缺失的问题
          git clone --depth=1 https://github.com official-sub2api
          
          cd official-sub2api/backend || { echo "错误：官方源码中未找到 backend 目录！"; exit 1; }
          echo "成功进入后端源码目录"

          echo "==== 2. 开始编译适用于 Serv00 的 FreeBSD 二进制文件 ===="
          # 开启纯静态编译并携带网页嵌入标签
          CGO_ENABLED=0 GOOS=freebsd GOARCH=amd64 go build -tags embed -ldflags="-s -w" -o sub2api ./cmd/server/

          # 将编译好的二进制移动到工作流根目录
          mv sub2api $GITHUB_WORKSPACE/

      - name: Tar binary file
        run: |
          tar -czvf sub2api-freebsd-amd64.tar.gz sub2api

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub2api-freebsd-pkg
          path: sub2api-freebsd-amd64.tar.gz
          retention-days: 5
