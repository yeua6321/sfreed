name: Build for Serv00 FreeBSD

on:
  workflow_dispatch: # 支持手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Find go.mod and Build FreeBSD Binary
        run: |
          # 1. 自动寻找 go.mod 所在的目录
          MOD_PATH=$(find . -name "go.mod" -print -quit)
          if [ -z "$MOD_PATH" ]; then
            echo "错误: 未在仓库中找到 go.mod 文件！"
            exit 1
          fi
          
          # 获取 go.mod 所在目录的绝对路径
          SRC_DIR=$(dirname "$(realpath "$MOD_PATH")")
          echo "找到 go.mod 所在目录: $SRC_DIR"
          cd "$SRC_DIR"

          # 2. 编译 FreeBSD 二进制文件 (不再写死 main.go，由 Go 自动识别 main 包)
          CGO_ENABLED=0 GOOS=freebsd GOARCH=amd64 go build -ldflags="-s -w" -o sub2api

          # 3. 将编译好的二进制移动到工作流根目录以便打包
          mv sub2api $GITHUB_WORKSPACE/

      - name: Tar binary file
        run: |
          tar -czvf sub2api-freebsd-amd64.tar.gz sub2api

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sub2api-freebsd-pkg
          path: sub2api-freebsd-amd64.tar.gz
          retention-days: 5
